<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Etch-a-Sketch</title>
    <link rel="stylesheet" href="style.css"/>
</head>
<body>
    <div class="option">
        <div class="resize">
            <button class="resize-button">Resize</button>
            <input type="text" id="size-input" placeholder="number 2-100">
        </div>
        <button class="draw-button">Draw</button>
        <button class="eraser-button">Eraser</button>
        <button class="reset-button">Reset</button>
    </div>
    
    <div class="grid"></div>
    
    <script src="script.js"></script>
</body>
</html>
